<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OpenShop — Vendor Setup Guide</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f5f5f3;--bg3:#eeede9;--tx:#1a1a1a;--tx2:#6b6b68;--bd:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.22);--gr:#1D9E75;--grd:#0F6E56;--grl:#E1F5EE;--r:8px;--rl:12px;--f:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1c;--bg2:#262626;--bg3:#2e2e2e;--tx:#f0f0ee;--tx2:#999994;--bd:rgba(255,255,255,0.12);--bd2:rgba(255,255,255,0.22);--grl:#0a3d2a}}
body{font-family:var(--f);background:var(--bg3);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
#app{display:flex;flex-direction:column;width:100%;max-width:560px;height:700px;border:.5px solid var(--bd);border-radius:var(--rl);overflow:hidden;background:var(--bg);box-shadow:0 4px 24px rgba(0,0,0,0.08);position:relative}
#hdr{padding:12px 15px;border-bottom:.5px solid var(--bd);background:var(--bg2);display:flex;align-items:center;gap:9px;flex-shrink:0;z-index:10}
.hdr-icon{width:29px;height:29px;background:#111;border-radius:var(--r);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-icon svg{width:22px;height:26px}
.hdr-text h2{font-size:12.5px;font-weight:600;color:var(--tx)}
.hdr-text p{font-size:11px;color:var(--tx2)}
.tabs{display:flex;margin-left:auto;gap:2px;background:var(--bg);border:.5px solid var(--bd);border-radius:var(--r);padding:2px}
.tab{font-size:11px;font-family:var(--f);padding:3px 9px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:var(--tx2);transition:background .12s,color .12s}
.tab.on{background:var(--gr);color:#fff}
.admin-toggle{width:26px;height:26px;background:none;border:.5px solid var(--bd2);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--tx2);margin-left:4px;flex-shrink:0;transition:border-color .12s,color .12s}
.admin-toggle:hover{color:var(--tx);border-color:var(--tx2)}
.admin-toggle.on{background:var(--tx);color:var(--bg);border-color:var(--tx)}
#chat-p,#cl-p,#admin-p{display:flex;flex-direction:column;flex:1;overflow:hidden}
.hide{display:none!important}
#msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.msg{display:flex;flex-direction:column;max-width:88%}
.msg.u{align-self:flex-end;align-items:flex-end}
.msg.b{align-self:flex-start;align-items:flex-start}
.bub{padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.65;color:var(--tx)}
.msg.u .bub{background:var(--gr);color:#fff;border-bottom-right-radius:4px}
.msg.b .bub{background:var(--bg2);border:.5px solid var(--bd);border-bottom-left-radius:4px}
.bub a{color:var(--grd);text-decoration:underline}.bub a:hover{color:#085041}
.msg.u .bub a{color:#9FE1CB}
.bub p{margin:0 0 8px}.bub p:last-child{margin-bottom:0}
.bub ul,.bub ol{padding-left:18px;margin:6px 0 8px}
.bub ul:last-child,.bub ol:last-child{margin-bottom:0}
.bub li{margin-bottom:4px;line-height:1.55}.bub li:last-child{margin-bottom:0}
.bub strong{font-weight:600}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.chip{background:var(--bg);border:.5px solid var(--gr);color:var(--grd);font-size:11.5px;padding:4px 10px;border-radius:20px;cursor:pointer;font-family:var(--f);transition:background .12s}
.chip:hover{background:var(--grl)}
#inp-area{border-top:.5px solid var(--bd);padding:9px 11px;display:flex;gap:7px;align-items:flex-end;flex-shrink:0}
#u-inp{flex:1;border:.5px solid var(--bd2);border-radius:18px;padding:7px 13px;font-size:13px;font-family:var(--f);color:var(--tx);background:var(--bg);outline:none;resize:none;line-height:1.4;max-height:80px;overflow-y:auto}
#u-inp:focus{border-color:var(--gr)}
#snd{width:32px;height:32px;border-radius:50%;background:var(--gr);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .12s}
#snd:hover{background:var(--grd)}#snd:disabled{background:var(--bd);cursor:default}
#snd svg{width:14px;height:14px;fill:#fff}
.typing{display:flex;gap:4px;padding:10px 13px;background:var(--bg2);border:.5px solid var(--bd);border-radius:14px;border-bottom-left-radius:4px;width:fit-content}
.dot{width:5px;height:5px;background:var(--tx2);border-radius:50%;animation:bounce 1.1s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-4px)}}
#prog-bar{flex-shrink:0;background:var(--bg);border-bottom:.5px solid var(--bd);padding:12px 15px 10px;z-index:5}
.prog-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.prog-lbl{font-size:12px;font-weight:600;color:var(--tx)}
.prog-right{display:flex;align-items:baseline;gap:4px}
.prog-pct{font-size:20px;font-weight:600;color:var(--gr);transition:all .4s cubic-bezier(.34,1.56,.64,1);line-height:1}
.prog-of{font-size:11px;color:var(--tx2)}
.prog-track{width:100%;height:10px;background:var(--bg2);border-radius:10px;overflow:hidden}
.prog-fill{height:100%;border-radius:10px;background:var(--gr);transition:width .55s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.prog-fill::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:rgba(255,255,255,.28);animation:shimmer 2.4s ease-in-out infinite}
@keyframes shimmer{0%{left:-60%}100%{left:160%}}
.prog-ms-row{display:flex;justify-content:space-between;margin-top:6px}
.prog-ms{display:flex;flex-direction:column;align-items:center;gap:2px}
.prog-ms-dot{width:8px;height:8px;border-radius:50%;background:var(--bd2);transition:background .3s,transform .3s cubic-bezier(.34,1.56,.64,1)}
.prog-ms-dot.reached{background:var(--gr);transform:scale(1.3)}.prog-ms-dot.done{background:var(--gr)}
.prog-ms-lbl{font-size:9.5px;color:var(--tx2)}.prog-ms-lbl.reached{color:var(--grd);font-weight:600}
.prog-msg{font-size:11px;color:var(--grd);text-align:center;margin-top:5px;min-height:15px;font-weight:600}
#cl-scroll{flex:1;overflow-y:auto;padding:10px 15px 14px}
.cl-top{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.cl-title{font-size:13px;font-weight:600;color:var(--tx);flex:1}
.cl-act{font-size:11px;font-family:var(--f);background:none;border:.5px solid var(--bd2);border-radius:var(--r);padding:4px 9px;cursor:pointer;color:var(--tx2);display:flex;align-items:center;gap:4px;transition:color .12s}
.cl-act:hover{color:var(--tx)}.cl-act svg{width:11px;height:11px;fill:currentColor}
.cl-sec{margin-bottom:12px}
.cl-sec-ttl{font-size:10.5px;font-weight:600;color:var(--grd);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;padding-bottom:4px;border-bottom:.5px solid var(--bd)}
.cl-item{border-bottom:.5px solid var(--bd);padding:7px 0 4px}.cl-item:last-child{border-bottom:none}
.cl-row{display:flex;align-items:flex-start;gap:8px;cursor:pointer}
.cl-row:hover .cl-box{border-color:var(--gr)}
.cl-box{width:15px;height:15px;border:1.5px solid var(--bd2);border-radius:4px;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s}
.cl-box.chk{background:var(--gr);border-color:var(--gr)}
.cl-box.pop{animation:pop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.45)}100%{transform:scale(1)}}
.cl-box.chk::after{content:'';display:block;width:8px;height:4px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px)}
.cl-lbl{font-size:12.5px;line-height:1.5;color:var(--tx);flex:1}.cl-lbl.done{color:var(--tx2);text-decoration:line-through}
.cl-acts2{display:flex;margin-top:3px;padding-left:23px}
.cl-note-btn{font-size:11px;color:var(--tx2);background:none;border:none;cursor:pointer;font-family:var(--f);padding:0}
.cl-note-btn:hover{color:var(--grd)}
.cl-note-area{margin-top:4px;padding-left:23px}
.cl-note-in{width:100%;font-size:12px;font-family:var(--f);border:.5px solid var(--bd2);border-radius:var(--r);padding:5px 8px;color:var(--tx);background:var(--bg);resize:none;min-height:48px;outline:none;line-height:1.5}
.cl-note-in:focus{border-color:var(--gr)}
.cl-note-disp{font-size:11.5px;color:var(--tx2);background:var(--bg2);border-radius:var(--r);padding:4px 8px;line-height:1.5;font-style:italic}
.cl-note-btns{display:flex;gap:5px;margin-top:3px}
.cl-note-save{font-size:11px;font-family:var(--f);background:var(--gr);color:#fff;border:none;border-radius:var(--r);padding:3px 9px;cursor:pointer}
.cl-note-save:hover{background:var(--grd)}
.cl-note-del{font-size:11px;font-family:var(--f);background:none;color:var(--tx2);border:.5px solid var(--bd2);border-radius:var(--r);padding:3px 9px;cursor:pointer}
.auto-badge{font-size:9.5px;background:var(--grl);color:var(--grd);border-radius:10px;padding:1px 6px;margin-left:5px;font-weight:600}
.cl-empty{text-align:center;padding:32px 20px;color:var(--tx2);font-size:13px;line-height:1.6}
.cl-empty strong{display:block;font-size:14px;font-weight:600;color:var(--tx);margin-bottom:6px}
.cl-pick{display:flex;align-items:center;padding:9px 0;border-bottom:.5px solid var(--bd);cursor:pointer;font-size:13px;color:var(--tx)}
.cl-pick:last-child{border-bottom:none}.cl-pick:hover{color:var(--grd)}
.cl-pick-arr{font-size:11px;color:var(--tx2);margin-left:auto}
.upgrade-gate{position:relative;margin-top:4px;border-radius:var(--rl);overflow:hidden}
.blurred-preview{filter:blur(6px);pointer-events:none;user-select:none;opacity:.55;max-height:260px;overflow:hidden}
.upgrade-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:stretch;z-index:10}
.upgrade-fade-top{width:100%;height:52px;background:linear-gradient(to bottom,var(--bg),transparent);flex-shrink:0}
.upgrade-card{background:var(--bg);border:1px solid rgba(29,158,117,.35);border-radius:var(--rl);padding:18px 16px;margin:0 0 8px;box-shadow:0 4px 20px rgba(29,158,117,.10)}
.upgrade-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--grd);background:var(--grl);border-radius:20px;padding:2px 9px;margin-bottom:10px;text-transform:uppercase;letter-spacing:.04em}
.upgrade-hl{font-size:15px;font-weight:700;color:var(--tx);line-height:1.3;margin-bottom:6px}
.upgrade-tagline{font-size:12px;color:var(--grd);font-weight:600;margin-bottom:8px}
.upgrade-body{font-size:12px;color:var(--tx2);line-height:1.55;margin-bottom:12px}
.upgrade-feats{list-style:none;padding:0;margin:0 0 14px;display:grid;grid-template-columns:1fr 1fr;gap:5px 10px}
.upgrade-feats li{font-size:11.5px;color:var(--tx);display:flex;align-items:flex-start;gap:5px;line-height:1.4}
.upgrade-feats li::before{content:'✓';color:var(--gr);font-weight:700;flex-shrink:0}
.upgrade-cta{width:100%;background:var(--gr);color:#fff;border:none;border-radius:var(--r);padding:11px 16px;font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer;transition:background .15s;letter-spacing:.01em}
.upgrade-cta:hover{background:var(--grd)}
.upgrade-confirm{width:100%;background:transparent;color:var(--gr);border:1.5px solid var(--gr);border-radius:var(--r);padding:10px 16px;font-size:12.5px;font-weight:600;font-family:var(--f);cursor:pointer;transition:background .15s;margin-top:6px;letter-spacing:.01em}
.upgrade-confirm:hover{background:var(--grl)}
.upgrade-sub{font-size:11px;color:var(--tx2);text-align:center;margin-top:7px}
.admin-auth-wrap{display:flex;align-items:center;justify-content:center;height:100%;padding:20px}
.admin-auth-box{background:var(--bg);border:.5px solid var(--bd);border-radius:var(--rl);padding:24px 20px;width:100%;max-width:280px;text-align:center}
.admin-auth-icon{font-size:28px;margin-bottom:10px}
.admin-auth-ttl{font-size:14px;font-weight:600;color:var(--tx);margin-bottom:4px}
.admin-auth-sub{font-size:12px;color:var(--tx2);margin-bottom:14px;line-height:1.5}
.admin-auth-in{width:100%;border:.5px solid var(--bd2);border-radius:var(--r);padding:8px 12px;font-size:13px;font-family:var(--f);color:var(--tx);background:var(--bg);outline:none;text-align:center}
.admin-auth-in:focus{border-color:var(--gr)}
.admin-pw-err{font-size:11px;color:#e53e3e;margin-top:6px;min-height:16px}
.admin-auth-btn{width:100%;background:var(--tx);color:var(--bg);border:none;border-radius:var(--r);padding:10px;font-size:13px;font-weight:600;font-family:var(--f);cursor:pointer;margin-top:10px}
.admin-auth-btn:hover{opacity:.85}
.admin-hdr{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:.5px solid var(--bd);flex-shrink:0}
.admin-hdr-title{font-size:13px;font-weight:600;color:var(--tx)}
.admin-hdr-btns{display:flex;gap:6px;align-items:center}
.export-btn{font-size:11px;font-family:var(--f);background:var(--tx);color:var(--bg);border:none;border-radius:var(--r);padding:4px 10px;cursor:pointer;font-weight:500;transition:opacity .12s}
.export-btn:hover{opacity:.8}
.export-btn:disabled{opacity:.4;cursor:default}
.admin-lock{font-size:11px;font-family:var(--f);background:none;border:.5px solid var(--bd2);border-radius:var(--r);padding:4px 9px;cursor:pointer;color:var(--tx2)}
.admin-lock:hover{color:var(--tx)}
.admin-subtabs-bar{padding:8px 14px;border-bottom:.5px solid var(--bd);flex-shrink:0}
.admin-sub-tabs{display:flex;gap:3px;background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);padding:2px}
.admin-sub-tab{flex:1;font-size:11px;font-family:var(--f);padding:4px 6px;border:none;border-radius:6px;cursor:pointer;background:transparent;color:var(--tx2);transition:background .12s,color .12s;white-space:nowrap}
.admin-sub-tab.on{background:var(--bg);color:var(--tx);font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.08)}
#admin-content{flex:1;overflow-y:auto;padding:14px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:18px}
.stat-card{background:var(--bg2);border:.5px solid var(--bd);border-radius:var(--r);padding:11px 12px;text-align:center}
.stat-val{font-size:20px;font-weight:700;color:var(--gr);line-height:1;margin-bottom:3px}
.stat-lbl{font-size:10px;color:var(--tx2);font-weight:500;line-height:1.3}
.chart-sec{margin-bottom:18px}
.chart-ttl{font-size:10.5px;font-weight:600;color:var(--grd);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;padding-bottom:5px;border-bottom:.5px solid var(--bd)}
.chart-note{font-size:10px;color:var(--tx2);font-style:italic;margin-bottom:6px}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.bar-lbl{font-size:11px;color:var(--tx);width:108px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:7px;background:var(--bg2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:var(--gr);border-radius:4px;transition:width .4s ease}
.bar-fill-b{height:100%;background:#60C4A8;border-radius:4px}
.bar-val{font-size:10.5px;color:var(--tx2);min-width:54px;text-align:right;flex-shrink:0}
.bar-empty{font-size:12px;color:var(--tx2);padding:6px 0;font-style:italic}
.sess-item{border:.5px solid var(--bd);border-radius:var(--r);padding:9px 12px;margin-bottom:6px}
.sess-r1{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.sess-date{font-size:12px;color:var(--tx);font-weight:500}
.new-badge{font-size:9.5px;background:var(--grl);color:var(--grd);border-radius:10px;padding:1px 6px;font-weight:600}
.paid-badge{font-size:9.5px;background:#e6f4ea;color:#276749;border-radius:10px;padding:1px 6px;font-weight:600}
.pw-badge{font-size:9.5px;background:#fff8e1;color:#7c5c00;border-radius:10px;padding:1px 6px;font-weight:600}
.cl-badge{font-size:9.5px;background:var(--bg2);color:var(--tx2);border-radius:10px;padding:1px 6px;border:.5px solid var(--bd)}
.sess-r2{display:flex;gap:10px;font-size:11px;color:var(--tx2);flex-wrap:wrap}
.q-item{border:.5px solid var(--bd);border-radius:var(--r);padding:10px 12px;margin-bottom:6px}
.q-date{font-size:10.5px;color:var(--tx2);margin-bottom:4px}
.q-text{font-size:12.5px;color:var(--tx);line-height:1.5}
.admin-footer{margin-top:16px;padding-top:12px;border-top:.5px solid var(--bd);display:flex;gap:8px}
.admin-btn-sm{flex:1;font-size:11px;font-family:var(--f);background:none;border:.5px solid var(--bd2);border-radius:var(--r);padding:6px;cursor:pointer;color:var(--tx2)}
.admin-btn-sm:hover{color:var(--tx)}
.admin-btn-danger{color:#e53e3e!important;border-color:rgba(229,62,62,.4)!important}
.admin-btn-danger:hover{background:rgba(229,62,62,.06)!important}
.admin-loading{display:flex;align-items:center;justify-content:center;height:60px}
.admin-empty{text-align:center;padding:32px 20px;color:var(--tx2);font-size:13px}
.confetti-c{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;border-radius:var(--rl)}
.em-wrap{position:absolute;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:30;border-radius:var(--rl)}
.em-inner{background:var(--bg);border-radius:var(--rl);padding:20px;width:290px;border:.5px solid var(--bd)}
.em-ttl{font-size:13.5px;font-weight:600;color:var(--tx);margin-bottom:5px}
.em-sub{font-size:12px;color:var(--tx2);margin-bottom:11px;line-height:1.5}
.em-in{width:100%;border:.5px solid var(--bd2);border-radius:var(--r);padding:7px 10px;font-size:13px;font-family:var(--f);color:var(--tx);background:var(--bg);outline:none}
.em-in:focus{border-color:var(--gr)}
.em-acts{display:flex;gap:7px;margin-top:11px;justify-content:flex-end}
.em-cancel{font-size:12px;font-family:var(--f);background:none;border:.5px solid var(--bd2);border-radius:var(--r);padding:5px 12px;cursor:pointer;color:var(--tx2)}
.em-send{font-size:12px;font-family:var(--f);background:var(--gr);color:#fff;border:none;border-radius:var(--r);padding:5px 12px;cursor:pointer}
.em-send:hover{background:var(--grd)}
.em-msg{font-size:12px;color:var(--grd);margin-top:7px}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="hdr-icon">
      <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 4 C25 4 6 23 6 48 C6 72 50 116 50 116 C50 116 94 72 94 48 C94 23 75 4 50 4Z" fill="none" stroke="white" stroke-width="8"/>
        <circle cx="50" cy="44" r="18" fill="none" stroke="white" stroke-width="7"/>
        <circle cx="50" cy="44" r="8" fill="white"/>
        <line x1="52" y1="70" x2="72" y2="58" stroke="white" stroke-width="6" stroke-linecap="round"/>
        <polyline points="38,80 50,96 62,80" fill="none" stroke="white" stroke-width="6" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="hdr-text"><h2>OpenShop</h2><p>Powered by Shop the Heights JC</p></div>
    <div class="tabs">
      <button class="tab on" id="tab-chat" onclick="switchTab('chat')">Chat</button>
      <button class="tab" id="tab-cl" onclick="switchTab('cl')">My Checklist</button>
    </div>
    <button class="admin-toggle" id="admin-toggle" onclick="switchTab('admin')" title="Admin">⚙</button>
  </div>
  <div id="chat-p">
    <div id="msgs"></div>
    <div id="inp-area">
      <textarea id="u-inp" placeholder="Ask anything about becoming a vendor..." rows="1"></textarea>
      <button id="snd"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
    </div>
  </div>

  },

    if(window.storage)return window.storage.set(k,v,sh);
    try{localStorage.setItem(k,String(v));}catch(e){}return{key:k,value:v};
  },
  async delete(k,sh=false){
    if(window.storage)return window.storage.delete(k,sh);
    localStorage.removeItem(k);return{key:k,deleted:true};
  }
};

// ── PROGRESS BAR ───────────────────────────────────────────────────────────
function updateProg(anim){
  const el=document.getElementById('prog-bar');
  if(!activeCL||!isUnlocked){el.innerHTML='';return;}
  const cl=CL[activeCL];let t=0,d=0;cl.sections.forEach(s=>s.items.forEach(i=>{t++;if(checks[i.id])d++;}));
  const pct=t>0?Math.round((d/t)*100):0;
  el.innerHTML=`<div class="prog-hdr"><span class="prog-lbl">${cl.label}</span><div class="prog-right"><span class="prog-pct" id="pp">${pct}%</span><span class="prog-of">${d} of ${t} steps</span></div></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%"></div></div><div class="prog-ms-row">${MILESTONES.map(m=>`<div class="prog-ms"><div class="prog-ms-dot ${pct>=m?(pct>m?'done':'reached'):''}"></div><span class="prog-ms-lbl ${pct===m?'reached':''}">${m}%</span></div>`).join('')}</div><div class="prog-msg">${[100,75,50,25].reduce((a,m)=>pct>=m&&!a?MS_MSGS[m]:a,'')}</div>`;
  if(anim&&pct>lastPct){const pp=document.getElementById('pp');if(pp){pp.style.transform='scale(1.25)';pp.style.color='#0F6E56';setTimeout(()=>{pp.style.transform='scale(1)';pp.style.color='';},400);}for(const m of MILESTONES){if(pct>=m&&lastPct<m){launchConfetti();break;}}}
  lastPct=pct;
}

function launchConfetti(){
  const c=document.getElementById('conf-c'),ctx=c.getContext('2d');c.width=c.offsetWidth;c.height=c.offsetHeight;
  const cols=['#1D9E75','#5DCAA5','#9FE1CB','#E1F5EE','#0F6E56','#FAC775','#fff'];
  const ps=Array.from({length:65},()=>({x:Math.random()*c.width,y:-20-Math.random()*80,r:Math.random()*5+2,col:cols[Math.floor(Math.random()*cols.length)],tilt:Math.random()*10-5,ta:0,tai:Math.random()*.04+.02,vx:(Math.random()-.5)*1.8,vy:Math.random()*1.4+.8,op:1,sh:Math.random()>.5?'r':'c',fs:c.height*.72}));
  let fr=0;(function draw(){ctx.clearRect(0,0,c.width,c.height);let any=false;ps.forEach(p=>{if(p.op<=0)return;any=true;ctx.save();ctx.globalAlpha=p.op;ctx.fillStyle=p.col;ctx.translate(p.x,p.y);ctx.rotate(p.tilt*Math.PI/180);p.sh==='r'?ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r):(ctx.beginPath(),ctx.arc(0,0,p.r,0,Math.PI*2),ctx.fill());ctx.restore();p.ta+=p.tai;p.tilt=Math.sin(p.ta)*12;p.x+=p.vx;p.y+=p.vy;p.vy+=.025;if(p.y>p.fs)p.op-=.018;});fr++;if(fr<220&&any)requestAnimationFrame(draw);else ctx.clearRect(0,0,c.width,c.height);})();
}

    return;
  }
  updateProg(false);
  const cl=CL[activeCL];let total=0;cl.sections.forEach(s=>total+=s.items.length);
  const freeLimit=Math.ceil(total*0.35);
  const topbar=isUnlocked
    ?`<div class="cl-top"><span class="cl-title">${cl.label}</span><button class="cl-act" onclick="openEmailModal()"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>Email</button><button class="cl-act" onclick="printCL()"><svg viewBox="0 0 24 24"><path d="M19 8H5c-1.66 0-3 1.34-3 3v6h4v4h12v-4h4v-6c0-1.66-1.34-3-3-3zm-3 11H8v-5h8v5zm3-7c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1zm-1-9H6v4h12V3z"/></svg>Print</button><button class="cl-act" onclick="resetCL()">Change type</button></div>`
    :`<div class="cl-top"><span class="cl-title">${cl.label}</span><button class="cl-act" onclick="resetCL()">Change type</button></div>`;
  let freeHtml='',lockedHtml='',seen=0;
  cl.sections.forEach(s=>{let fi='',li='';s.items.forEach(item=>{const ih=renderItemHtml(item);if(!isUnlocked&&seen>=freeLimit)li+=ih;else{fi+=ih;seen++;}});if(fi)freeHtml+=`<div class="cl-sec"><div class="cl-sec-ttl">${s.title}</div>${fi}</div>`;if(li)lockedHtml+=`<div class="cl-sec"><div class="cl-sec-ttl">${s.title}</div>${li}</div>`;});
  let html=topbar+freeHtml;
  if(!isUnlocked&&lockedHtml){html+=`<div class="upgrade-gate"><div class="blurred-preview">${lockedHtml}</div><div class="upgrade-overlay"><div class="upgrade-fade-top"></div><div class="upgrade-card"><div class="upgrade-badge">🔒 Full Plan</div><div class="upgrade-hl">Unlock your complete vendor launch plan.</div><div class="upgrade-tagline">Most vendors complete the process in 2–3 weeks using this plan.</div><div class="upgrade-body">Stop guessing and chasing paperwork. Your full OpenShop plan walks you through every step — in order, with links — so you arrive fully prepared.</div><ul class="upgrade-feats"><li>Complete step-by-step checklist</li><li>All permit requirements</li><li>Application links & forms</li><li>Timeline guidance</li><li>Progress tracking</li><li>Email & print export</li></ul><button class="upgrade-cta" onclick="openStripe()">${stripeOpened?'↩ Back to payment':'Unlock my plan — $15 one-time fee'}</button>${stripeOpened?'<button class="upgrade-confirm" onclick="unlockAccess()">✓ I\'ve completed payment — unlock now</button>':''}<div class="upgrade-sub">One-time payment. Instant access. No subscription.</div></div></div></div>`;}
  sc.innerHTML=html;
}

function renderItemHtml(item){
  const chk=!!checks[item.id],isAuto=autoCks.has(item.id),note=notes[item.id]||'',noteOpen=!!openNotes[item.id];
  return`<div class="cl-item"><div class="cl-row" onclick="toggleItem('${item.id}')"><div class="cl-box ${chk?'chk':''}" id="cb-${item.id}"></div><div class="cl-lbl ${chk?'done':''}">${item.text}${isAuto?'<span class="auto-badge">auto</span>':''}</div></div><div class="cl-acts2"><button class="cl-note-btn" onclick="toggleNote('${item.id}')">${note?'Edit note':'+ Add note'}</button></div>${noteOpen?`<div class="cl-note-area"><textarea class="cl-note-in" id="ni-${item.id}" placeholder="Add a note...">${note}</textarea><div class="cl-note-btns"><button class="cl-note-save" onclick="saveNote('${item.id}')">Save</button>${note?`<button class="cl-note-del" onclick="delNote('${item.id}')">Remove</button>`:''}</div></div>`:note?`<div class="cl-note-area"><div class="cl-note-disp">${note}</div></div>`:''}</div>`;
}

function toggleItem(id){
  if(!isUnlocked){let tot=0;CL[activeCL].sections.forEach(s=>tot+=s.items.length);const lim=Math.ceil(tot*0.35);let idx=0,ok=false;outer:for(const s of CL[activeCL].sections){for(const item of s.items){if(item.id===id){ok=idx<lim;break outer;}idx++;}}if(!ok)return;}
  const was=!!checks[id];checks[id]=!was;if(!checks[id])autoCks.delete(id);
  const box=document.getElementById('cb-'+id);if(box&&!was){box.classList.add('pop');setTimeout(()=>box.classList.remove('pop'),400);}
  renderCL();updateProg(true);updateStoredSession();
}
function toggleNote(id){openNotes[id]=!openNotes[id];renderCL();if(openNotes[id])setTimeout(()=>{const el=document.getElementById('ni-'+id);if(el)el.focus();},50);}
function saveNote(id){const el=document.getElementById('ni-'+id);if(el)notes[id]=el.value.trim();openNotes[id]=false;renderCL();}

function setCL(k){activeCL=k;lastPct=0;sessionData.checklistType=k;renderCL();updateProg(false);updateStoredSession();}

function fmtDur(ms){if(!ms||ms<1000)return'<1s';const s=Math.floor(ms/1000);if(s<60)return`${s}s`;const m=Math.floor(s/60),rs=s%60;return rs>0?`${m}m ${rs}s`:`${m}m`;}
function fmtTs(ts){if(!ts)return'—';const d=new Date(ts),now=new Date();const t=d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});return d.toDateString()===now.toDateString()?`Today ${t}`:`${d.toLocaleDateString([],{month:'short',day:'numeric'})} ${t}`;}
function ageGroup(n){const v=parseInt(n);if(isNaN(v)||v<1)return null;if(v<25)return'18–24';if(v<35)return'25–34';if(v<45)return'35–44';if(v<55)return'45–54';return'55+';}

function renderBars(dataObj,denominator,alt=false){
  const entries=Object.entries(dataObj).sort((a,b)=>b[1]-a[1]).slice(0,7);
  if(!entries.length)return`<div class="bar-empty">No data yet</div>`;
  const max=entries[0][1];
  return entries.map(([lbl,cnt])=>{
    const pct=denominator>0?Math.round(cnt/denominator*100):0;
    const w=Math.round(cnt/max*100);
    return`<div class="bar-row"><span class="bar-lbl" title="${lbl}">${lbl}</span><div class="bar-track"><div class="${alt?'bar-fill-b':'bar-fill'}" style="width:${w}%"></div></div><span class="bar-val">${cnt} · ${pct}%</span></div>`;
  }).join('');
}

function buildAdminOverview(sessions,users){
  const total=sessions.length;
  const newU=sessions.filter(s=>s.isNewUser).length;
  const pwViews=sessions.filter(s=>s.paywallViewed).length;
  const paid=sessions.filter(s=>s.paymentCompleted).length;
  const overallConv=total>0?Math.round(paid/total*100):0;
  const pwConv=pwViews>0?Math.round(paid/pwViews*100):0;
  const avgDur=total>0?sessions.reduce((a,s)=>a+(s.durationMs||0),0)/total:0;
  const clSessions=sessions.filter(s=>s.checklistType&&(s.stepsCompleted||0)>0);
  const avgSteps=clSessions.length>0?(clSessions.reduce((a,s)=>a+(s.stepsCompleted||0),0)/clSessions.length).toFixed(1):0;
  const returning=sessions.filter(s=>!s.isNewUser).length;
  const uVals=Object.values(users);
  const returnUsers=uVals.filter(u=>u.sessionCount>1).length;
  const totalUsers=uVals.length;

  // Business types
  const bizMap={};sessions.forEach(s=>{if(s.checklistType){const lbl=CL[s.checklistType]?.label||s.checklistType;bizMap[lbl]=(bizMap[lbl]||0)+1;}});

  // Days ordered Mon–Sun
  const dayOrder=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const dayMap={};sessions.forEach(s=>{if(s.dayOfWeek)dayMap[s.dayOfWeek]=(dayMap[s.dayOfWeek]||0)+1;});
  const orderedDays={};dayOrder.forEach(d=>{if(dayMap[d])orderedDays[d]=dayMap[d];});

  // Demographics (self-reported)
  const demSessions=sessions.filter(s=>s.gender||s.age||s.locationReported);
  const demN=demSessions.length;
  const gMap={};sessions.forEach(s=>{if(s.gender){const g=s.gender.charAt(0).toUpperCase()+s.gender.slice(1);gMap[g]=(gMap[g]||0)+1;}});
  const gTotal=Object.values(gMap).reduce((a,b)=>a+b,0);
  const ageOrder=['18–24','25–34','35–44','45–54','55+'];
  const ageMap={};sessions.forEach(s=>{if(s.age){const g=ageGroup(s.age);if(g)ageMap[g]=(ageMap[g]||0)+1;}});
  const ageTotal=Object.values(ageMap).reduce((a,b)=>a+b,0);
  const orderedAges={};ageOrder.forEach(a=>{if(ageMap[a])orderedAges[a]=ageMap[a];});

  // Locations: prefer self-reported over IP
  const cityMap={};
  sessions.forEach(s=>{
    const loc=s.locationReported||(s.city?(s.region?`${s.city}, ${s.region}`:s.city):null);
    if(loc)cityMap[loc]=(cityMap[loc]||0)+1;
  });

  // Referrers
  const refMap={};sessions.forEach(s=>{const r=s.utmSource||s.referrer||'Direct';refMap[r]=(refMap[r]||0)+1;});

  return`
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val">${total}</div><div class="stat-lbl">Total Sessions</div></div>
    <div class="stat-card"><div class="stat-val">${newU}</div><div class="stat-lbl">New User Sessions</div></div>
    <div class="stat-card"><div class="stat-val">${pwViews}</div><div class="stat-lbl">Entered Paywall</div></div>
    <div class="stat-card"><div class="stat-val">${paid}</div><div class="stat-lbl">Payments</div></div>
    <div class="stat-card"><div class="stat-val">${overallConv}%</div><div class="stat-lbl">Overall Conversion</div></div>
    <div class="stat-card"><div class="stat-val">${pwConv}%</div><div class="stat-lbl">Paywall → Paid</div></div>
    <div class="stat-card"><div class="stat-val">${fmtDur(avgDur)}</div><div class="stat-lbl">Avg Session Time</div></div>
    <div class="stat-card"><div class="stat-val">${avgSteps}</div><div class="stat-lbl">Avg Steps Done</div></div>
  </div>
  <div class="chart-sec"><div class="chart-ttl">Business Type</div>${Object.keys(bizMap).length?renderBars(bizMap,total):'<div class="bar-empty">No checklist sessions yet</div>'}</div>
  <div class="chart-sec"><div class="chart-ttl">Day of Week</div>${Object.keys(orderedDays).length?renderBars(orderedDays,total):'<div class="bar-empty">No data yet</div>'}</div>
  <div class="chart-sec"><div class="chart-ttl">New vs. Returning</div>
    <div class="bar-row"><span class="bar-lbl">New visitors</span><div class="bar-track"><div class="bar-fill" style="width:${total>0?Math.round(newU/total*100):0}%"></div></div><span class="bar-val">${newU}</span></div>
    <div class="bar-row"><span class="bar-lbl">Returning</span><div class="bar-track"><div class="bar-fill-b" style="width:${total>0?Math.round(returning/total*100):0}%"></div></div><span class="bar-val">${returning}</span></div>
    <div class="bar-row" style="margin-top:3px"><span class="bar-lbl" style="color:var(--tx2);font-size:10.5px">Users w/ 2+ sessions</span><div class="bar-track"><div class="bar-fill" style="width:${totalUsers>0?Math.round(returnUsers/totalUsers*100):0}%"></div></div><span class="bar-val">${returnUsers} / ${totalUsers}</span></div>
  </div>
  ${Object.keys(cityMap).length?`<div class="chart-sec"><div class="chart-ttl">Locations</div><div class="chart-note">Self-reported when available, otherwise IP-based</div>${renderBars(cityMap,total)}</div>`:''}
  ${Object.keys(refMap).length?`<div class="chart-sec"><div class="chart-ttl">Referrer Sources</div>${renderBars(refMap,total,true)}</div>`:''}
  <div class="chart-sec">
    <div class="chart-ttl">Demographics <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--tx2)">(self-reported, n=${demN})</span></div>
    ${demN===0?'<div class="bar-empty">No responses yet — the optional demographics question is asked after several exchanges.</div>':`
      ${gTotal>0?`<div style="margin-bottom:10px"><div style="font-size:10px;font-weight:600;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em">Gender</div>${renderBars(gMap,gTotal)}</div>`:''}
      ${ageTotal>0?`<div style="margin-bottom:10px"><div style="font-size:10px;font-weight:600;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em">Age Range</div>${renderBars(orderedAges,ageTotal)}</div>`:''}
    `}
  </div>
  `;
}

function buildSessionsList(sessions){
  if(!sessions.length)return`<div class="admin-empty">No sessions recorded yet.</div>`;
  return[...sessions].reverse().map(s=>`<div class="sess-item"><div class="sess-r1"><span class="sess-date">${fmtTs(s.ts||s.startTime)}</span>${s.isNewUser?'<span class="new-badge">New</span>':''}${s.paymentCompleted?'<span class="paid-badge">Paid</span>':s.paywallViewed?'<span class="pw-badge">Paywall</span>':''}${s.checklistType&&CL[s.checklistType]?`<span class="cl-badge">${CL[s.checklistType].label}</span>`:''}</div><div class="sess-r2"><span>⏱ ${fmtDur(s.durationMs)}</span><span>💬 ${s.exchanges||0} Q&As</span><span>✅ ${s.stepsCompleted||0} steps</span>${(s.locationReported||s.city)?`<span>📍 ${s.locationReported||s.city}</span>`:''}</div></div>`).join('')+`<div class="admin-footer"><button class="admin-btn-sm admin-btn-danger" onclick="clearData('os_sessions')">Clear session data</button></div>`;

}

function exportCSV(sessions){
  const h=['Session ID','Date','Day of Week','New User','Duration (s)','Exchanges','Messages','Business Type','Steps Completed','Paywall Viewed','Payment Completed','Gender','Age','Self-Reported Location','IP City','IP Region','IP Country','Referrer','UTM Source','User ID'];
  const rows=sessions.map(s=>[s.id,s.ts?new Date(s.ts).toLocaleString():'',s.dayOfWeek||'',s.isNewUser?'Yes':'No',Math.round((s.durationMs||0)/1000),s.exchanges||0,s.totalMsgs||0,s.checklistType?CL[s.checklistType]?.label||s.checklistType:'',s.stepsCompleted||0,s.paywallViewed?'Yes':'No',s.paymentCompleted?'Yes':'No',s.gender||'',s.age||'',s.locationReported||'',s.city||'',s.region||'',s.country||'',s.referrer||'Direct',s.utmSource||'',s.userId||'']);
  const csv=[h,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`openShop-analytics-${new Date().toISOString().slice(0,10)}.csv`;a.click();URL.revokeObjectURL(url);
}

function extractTags(txt){
  const cl=txt.match(/\[CHECKLIST:([a-z_]+)\]/);
  const ids=[...txt.matchAll(/\[CHECK:([a-z0-9_]+)\]/g)].map(m=>m[1]);
  const unk=/\[UNKNOWN\]/.test(txt);
  const gen=txt.match(/\[GENDER:([a-z_]+)\]/);
  const age=txt.match(/\[AGE:(\d+)\]/);
  const loc=txt.match(/\[LOCATION:([^\]]+)\]/);
  return{clKey:cl?cl[1]:null,checkIds:ids,unknown:unk,gender:gen?gen[1]:null,age:age?parseInt(age[1]):null,location:loc?loc[1].trim():null};
}

function fmtBot(raw){
  const s=raw
    .replace(/\[CHECKLIST:[a-z_]+\]/g,'').replace(/\[CHECK:[a-z0-9_]+\]/g,'')
    .replace(/\[BUSINESS:[^\]]+\]/g,'').replace(/\[UNKNOWN\]/g,'')
    .replace(/\[GENDER:[a-z_]+\]/g,'').replace(/\[AGE:\d+\]/g,'')
    .replace(/\[LOCATION:[^\]]+\]/g,'').trim();
  const lines=s.split('\n'),blocks=[];let i=0;
  while(i<lines.length){
    const l=lines[i];
    if(/^#{1,3} /.test(l)){blocks.push({t:'h',tx:l.replace(/^#{1,3} /,'')});i++;continue;}
    if(/^(\*|-|\d+\.) /.test(l)){const its=[],ord=/^\d+\. /.test(l);while(i<lines.length&&/^(\*|-|\d+\.) /.test(lines[i])){its.push(lines[i].replace(/^(\*|-|\d+\.) /,''));i++;}blocks.push({t:'l',ord,its});continue;}
    if(l.trim()===''){if(blocks.length&&blocks[blocks.length-1].t!=='blank')blocks.push({t:'blank'});i++;continue;}
    if(blocks.length&&blocks[blocks.length-1].t==='p')blocks[blocks.length-1].tx+='\n'+l;
    else blocks.push({t:'p',tx:l});
    i++;
  }
  function inf(t){return t.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\[([^\]]+)\]\(mailto:([^)]+)\)/g,'<a href="mailto:$2">$1</a>').replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,(m,lb,url)=>`<a href="${url.replace(/"/g,'%22')}" target="_blank" rel="noopener">${lb}</a>`).replace(/(?<![">])(https?:\/\/[^\s<\]"]+)/g,(m,url)=>`<a href="${url.replace(/"/g,'%22')}" target="_blank" rel="noopener">${url}</a>`);}
  let html='';blocks.forEach(bl=>{if(bl.t==='blank')return;if(bl.t==='h'){html+=`<p><strong>${inf(bl.tx)}</strong></p>`;return;}if(bl.t==='l'){html+=`<${bl.ord?'ol':'ul'}>${bl.its.map(it=>`<li>${inf(it)}</li>`).join('')}</${bl.ord?'ol':'ul'}>`;return;}if(bl.t==='p')html+=`<p>${bl.tx.split('\n').map(l=>inf(l)).join('<br>')}</p>`;});
  return html;
}

const SYS=`You are OpenShop, a friendly and knowledgeable vendor guide powered by Shop the Heights JC. Help small business owners become approved vendors at Jersey City farmers markets. Tone: warm, encouraging, plain language.

FORMATTING RULES:

BUSINESS NAME: Ask early if not provided. When captured: [BUSINESS:name] at very end. Only once.

OPTIONAL DEMOGRAPHICS (ask once, after rapport is established):

Accept any response. If they skip entirely or seem uncomfortable, do not push and do not ask again. Only include tags for information they actually provide:
- [GENDER:male|female|non-binary|other|prefer_not_to_say]

// ── API CALL ───────────────────────────────────────────────────────────────
async function callAPI(msg){
  history.push({role:'user',content:msg});setBusy(true);showTyping();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:SYS,messages:history})});
    const data=await res.json();rmTyping();
    const reply=data.content?.map(b=>b.type==='text'?b.text:'').join('')||"I'm sorry, I had trouble responding. Please try again.";
    history.push({role:'assistant',content:reply});
    const{clKey,checkIds,unknown,gender,age,location}=extractTags(reply);
    if(clKey&&CL[clKey]){activeCL=clKey;lastPct=0;sessionData.checklistType=clKey;}
    if(checkIds.length>0)autoCheck(checkIds);
    if(gender&&!sessionData.gender){sessionData.gender=gender;demographicsAsked=true;}
    if(age&&!sessionData.age){sessionData.age=age;demographicsAsked=true;}
    if(location&&!sessionData.locationReported){sessionData.locationReported=location;demographicsAsked=true;}
    sessionData.exchanges++;
    sessionData.totalMsgs=history.filter(m=>m.role==='user').length;
    updateStoredSession();
    addMsg(reply,'b');
    if(unknown){
      pendingFeedback=true;
      setTimeout(()=>addMsg("Would you like to submit this question to the OpenShop team? We'll review it to help improve the tool.",'b',["Yes, submit question","No thanks"]),300);
    }
    if(checkIds.length>0||clKey){updateProg(true);if(checkIds.length>0){setTimeout(()=>{const tb=document.getElementById('tab-cl');tb.style.background='#1D9E75';tb.style.color='white';setTimeout(()=>{if(!tb.classList.contains('on')){tb.style.background='';tb.style.color='';}},2000);},500);}}
  }catch(e){rmTyping();addMsg("Sorry, I ran into a connection issue. Please try again in a moment.",'b');}
  setBusy(false);
}

// ── SEND HANDLER ───────────────────────────────────────────────────────────
function handleSend(txt){
  const msg=(txt||inpEl.value).trim();if(!msg||busy)return;
  inpEl.value='';inpEl.style.height='auto';
  if(pendingFeedback){
    pendingFeedback=false;addMsg(msg,'u');
    if(msg==="Yes, submit question"){sendFeedbackEmail();addMsg("Thank you! Your question has been sent to the OpenShop team at shoptheheightsjc@gmail.com. We'll review it and look to update the tool soon.",'b');}
    else addMsg("No problem — feel free to ask anything else!",'b');
    return;
  }
  addMsg(msg,'u');callAPI(msg);
}
sndBtn.onclick=()=>handleSend();
inpEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();}});
inpEl.addEventListener('input',()=>{inpEl.style.height='auto';inpEl.style.height=Math.min(inpEl.scrollHeight,80)+'px';});

// Listen for unlock message from parent page (when embedded in an iframe)
window.addEventListener('message',e=>{
  if(e.data==='OPENSHOP_UNLOCK'&&!isUnlocked){
    isUnlocked=true;renderCL();updateProg(false);
  }
});
initSession();
getGeoLocation();

},300);
